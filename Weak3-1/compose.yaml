services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: fintech
    ports: ["${PG_PORT:-5433}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U study -d fintech"]
      interval: 2s
      timeout: 2s
      retries: 30
