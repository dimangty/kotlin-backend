services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: study, POSTGRES_PASSWORD: study, POSTGRES_DB: diag }
    ports: ["${PG_PORT:-5432}:5432"]
    # pg_stat_statements грузится только через shared_preload_libraries: это
    # разделяемая память, её нельзя добавить на живом сервере через CREATE EXTENSION.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      # Всё, что дольше 200 мс, попадает в лог сервера с текстом запроса.
      - -c
      - log_min_duration_statement=200
      # Долгие транзакции и брошенные сессии не должны жить вечно.
      - -c
      - idle_in_transaction_session_timeout=60s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U study -d diag"]
      interval: 2s
      timeout: 2s
      retries: 30
