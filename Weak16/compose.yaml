services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: study, POSTGRES_PASSWORD: study, POSTGRES_DB: final }
    ports: ["${PG_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U study -d final"]
      interval: 2s
      timeout: 2s
      retries: 30
