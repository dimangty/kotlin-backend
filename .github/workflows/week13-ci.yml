name: week-13-ci
on:
  push:
    paths: ["Weak13/**", ".github/workflows/week13-ci.yml"]
  pull_request:
    paths: ["Weak13/**", ".github/workflows/week13-ci.yml"]
permissions:
  contents: read
defaults:
  run:
    working-directory: Weak13
jobs:
  test-and-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17", cache: gradle }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test --no-daemon
      - run: docker build -t week13:${{ github.sha }} .
