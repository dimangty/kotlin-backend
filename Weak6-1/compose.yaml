services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: study, POSTGRES_PASSWORD: study, POSTGRES_DB: isolation }
    ports: ["5436:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U study -d isolation"]
      interval: 2s
      timeout: 2s
      retries: 30
  postgres-lab:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: study, POSTGRES_PASSWORD: study, POSTGRES_DB: isolation_lab }
    ports: ["5446:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U study -d isolation_lab"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
      - ./session-a.sql:/lab/session-a.sql:ro
      - ./session-b.sql:/lab/session-b.sql:ro
